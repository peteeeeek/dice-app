<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주사위 AI 분석 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system;text-align:center;padding:30px;background:#111;color:#fff}
input{padding:8px;margin:3px;width:50px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;background:#ff4757;color:#fff;cursor:pointer}
.log{max-height:200px;overflow:auto;border:1px solid #333;margin-top:10px;padding:10px}
.item{margin:4px 0}
.box{margin-top:15px;padding:10px;border:1px solid #333}
</style>
</head>
<body>

<h1>🎲 주사위 AI 분석 시스템</h1>

<div>
<input id="d1"><input id="d2"><input id="d3">
<button onclick="saveData()">데이터 추가</button>
</div>

<div>
<button onclick="predictStat()">📊 통계 기반</button>
<button onclick="predictPattern()">🧠 패턴 기반</button>
</div>

<div class="log" id="log"></div>

<div id="output" class="box"></div>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];

// 저장
function saveLocal(){
  localStorage.setItem("history", JSON.stringify(history));
}

// 데이터 입력
function saveData(){
  let d=[+d1.value,+d2.value,+d3.value];
  if(d.includes(NaN)) return alert("입력");

  history.push(d);
  saveLocal();
  renderLog();
}

// 로그
function renderLog(){
  log.innerHTML = history.map((d,i)=>`
    <div class="item">${i+1}. 🎲 ${d.join(",")}</div>
  `).reverse().join("");
}

// ---------------------
// 📊 통계 기반 (기존)
// ---------------------
function predictStat(){
  let data = history.slice(-20);
  if(data.length<5) return alert("데이터 부족");

  let sums=data.map(x=>x[0]+x[1]+x[2]);

  let high=sums.filter(x=>x>=11).length;
  let low=sums.length-high;

  let even=sums.filter(x=>x%2===0).length;
  let odd=sums.length-even;

  let total=sums.length;

  output.innerHTML=`
    📊 통계 기반 결과<br>
    HIGH ${(high/total*100).toFixed(1)}%<br>
    짝 ${(even/total*100).toFixed(1)}%
  `;
}

// ---------------------
// 🧠 패턴 기반 (핵심)
// ---------------------
function predictPattern(){
  if(history.length < 5) return alert("데이터 부족");

  let transitions = {};

  for(let i=0; i<history.length-1; i++){
    let key = history[i].join(",");
    let next = history[i+1].join(",");

    if(!transitions[key]) transitions[key] = {};
    if(!transitions[key][next]) transitions[key][next] = 0;

    transitions[key][next]++;
  }

  let current = history[history.length-1].join(",");

  let nextData = transitions[current];

  if(!nextData){
    output.innerHTML = "❌ 해당 패턴 데이터 없음";
    return;
  }

  let total = Object.values(nextData).reduce((a,b)=>a+b,0);

  let result = Object.entries(nextData).map(([k,v])=>{
    return {
      nums: k,
      prob: (v/total*100)
    };
  });

  result.sort((a,b)=>b.prob-a.prob);

  let top = result.slice(0,3);

  output.innerHTML = `
    🧠 패턴 기반 예측<br>
    현재: ${current}<br><br>

    1️⃣ ${top[0]?.nums || "-"} (${top[0]?.prob.toFixed(1) || 0}%)<br>
    2️⃣ ${top[1]?.nums || "-"} (${top[1]?.prob.toFixed(1) || 0}%)<br>
    3️⃣ ${top[2]?.nums || "-"} (${top[2]?.prob.toFixed(1) || 0}%)
  `;
}

const log = document.getElementById("log");
const output = document.getElementById("output");

renderLog();
</script>

</body>
</html>
