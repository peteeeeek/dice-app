<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주사위 분석 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system;text-align:center;padding:30px;background:#111;color:#fff}
input{padding:8px;margin:3px;width:50px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;background:#ff4757;color:#fff;cursor:pointer}
.log{max-height:200px;overflow:auto;border:1px solid #333;margin-top:10px;padding:10px}
.item{margin:4px 0}
.box{margin-top:15px;padding:10px;border:1px solid #333}
.good{color:#2ed573}
.bad{color:#ff4757}
.warn{color:#ffa502}
</style>
</head>
<body>

<h1>🎲 주사위 AI 분석 시스템</h1>

<div>
<input id="d1"><input id="d2"><input id="d3">
<button onclick="saveData()" id="saveBtn">데이터 추가</button>
</div>

<button onclick="predict()">예측</button>

<div class="log" id="log"></div>

<div id="output" class="box"></div>
<div id="aiExplain" class="box"></div>
<div id="warning" class="box"></div>
<div id="pattern" class="box"></div>

<h3>결과 입력</h3>
<input id="r1"><input id="r2"><input id="r3">
<button onclick="checkResult()">검증</button>

<p id="accuracy"></p>

<canvas id="chart" width="300" height="200"></canvas>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let stats = JSON.parse(localStorage.getItem("stats")) || {total:0, hit:0, streak:0, failStreak:0, log:[]};
let lastPrediction = null;
let editIndex = null;
let chart;

// 저장
function saveLocal(){
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("stats", JSON.stringify(stats));
}

// 데이터 입력
function saveData(){
  let d=[+d1.value,+d2.value,+d3.value];
  if(d.includes(NaN)) return alert("입력");

  if(editIndex!==null){
    history[editIndex]=d;
    editIndex=null;
    saveBtn.innerText="데이터 추가";
  }else{
    history.push(d);
  }

  d1.value=""; d2.value=""; d3.value="";
  saveLocal();
  renderLog();
}

// 로그
function renderLog(){
  log.innerHTML = history.map((d,i)=>`
    <div class="item">
      ${i+1}. 🎲 ${d.join(",")}
      <button onclick="editData(${i})">수정</button>
      <button onclick="deleteData(${i})">삭제</button>
    </div>
  `).reverse().join("");
}

function editData(i){
  let d=history[i];
  d1.value=d[0]; d2.value=d[1]; d3.value=d[2];
  editIndex=i;
  saveBtn.innerText="수정 완료";
}

function deleteData(i){
  if(confirm("삭제?")){
    history.splice(i,1);
    saveLocal();
    renderLog();
  }
}

// 예측
function predict(){
  let data = history.slice(-20);
  if(data.length<5) return alert("데이터 부족");

  let sums=data.map(x=>x[0]+x[1]+x[2]);

  let high=sums.filter(x=>x>=11).length;
  let low=sums.length-high;

  let even=sums.filter(x=>x%2===0).length;
  let odd=sums.length-even;

  let total=sums.length;

  let pHigh=(high/total*100).toFixed(1);
  let pEven=(even/total*100).toFixed(1);

  // 숫자 빈도
  let freq=[0,0,0,0,0,0];
  data.forEach(d=>d.forEach(n=>freq[n-1]++));

  // 조합 평가
  let combos=[];
  for(let a=1;a<=6;a++){
    for(let b=1;b<=6;b++){
      for(let c=1;c<=6;c++){
        let sum=a+b+c;
        let score=freq[a-1]+freq[b-1]+freq[c-1];
        score+= sum>=11?high:low;
        score+= sum%2===0?even:odd;
        combos.push({nums:[a,b,c], sum, score});
      }
    }
  }

  let totalScore = combos.reduce((s,c)=>s+c.score,0);

  combos = combos.map(c=>({
    ...c,
    prob:(c.score/totalScore*100)
  }));

  combos.sort((a,b)=>b.score-a.score);

  let top3=combos.slice(0,3);

  lastPrediction={
    hl: high>low?"LOW":"HIGH",
    oe: even>odd?"홀":"짝"
  };

  // 출력
  output.innerHTML=`
    📊 HIGH ${pHigh}% / 짝 ${pEven}%<br><br>
    🎯 TOP3<br>
    1️⃣ ${top3[0].nums.join(",")} (${top3[0].prob.toFixed(2)}%)<br>
    2️⃣ ${top3[1].nums.join(",")} (${top3[1].prob.toFixed(2)}%)<br>
    3️⃣ ${top3[2].nums.join(",")} (${top3[2].prob.toFixed(2)}%)
  `;

  // AI 설명
  aiExplain.innerHTML=`
    🧠 분석 이유<br>
    - HIGH 비율 ${pHigh}% → ${lastPrediction.hl} 방향<br>
    - 짝 비율 ${pEven}% → ${lastPrediction.oe} 방향<br>
    - 많이 나온 숫자 중심 조합 추천
  `;

  // 위험 판단
  let diff=Math.abs(high-low);
  if(diff<=2){
    warning.innerHTML=`⚠️ <span class="warn">지금은 베팅 금지 (패턴 없음)</span>`;
  }else if(pHigh>70 || pEven>70){
    warning.innerHTML=`⚠️ <span class="warn">과열 구간 (반전 가능성 높음)</span>`;
  }else{
    warning.innerHTML=`✅ <span class="good">진입 가능 구간</span>`;
  }

  // 패턴 탐지
  let last5 = sums.slice(-5);
  let same = last5.every(v=>v>=11) || last5.every(v=>v<11);

  if(same){
    pattern.innerHTML=`🔥 <span class="warn">연속 패턴 감지 (쏠림 상태)</span>`;
  }else{
    pattern.innerHTML=`✔️ 정상 흐름`;
  }
}

// 검증
function checkResult(){
  let sum=+r1.value+ +r2.value+ +r3.value;
  let hl=sum>=11?"HIGH":"LOW";
  let oe=sum%2===0?"짝":"홀";

  stats.total++;

  let hit=(hl===lastPrediction.hl && oe===lastPrediction.oe);

  if(hit){
    stats.hit++;
    stats.streak++;
    stats.failStreak=0;
  }else{
    stats.failStreak++;
    stats.streak=0;
  }

  stats.log.push((stats.hit/stats.total)*100);

  saveLocal();
  updateUI();
}

function updateUI(){
  let acc=(stats.hit/stats.total*100).toFixed(1);
  accuracy.innerHTML=`적중률 ${acc}% / 연승 ${stats.streak}`;

  if(chart) chart.destroy();
  chart=new Chart(chartEl,{
    type:"line",
    data:{
      labels:stats.log.map((_,i)=>i+1),
      datasets:[{data:stats.log}]
    }
  });
}

const chartEl=document.getElementById("chart");

renderLog();
updateUI();
</script>

</body>
</html>
