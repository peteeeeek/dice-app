<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주사위 AI 엔진</title>
<style>
body{font-family:-apple-system;text-align:center;padding:30px;background:#111;color:#fff}
input{padding:8px;margin:3px;width:50px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;background:#ff4757;color:#fff}
.box{margin-top:15px;padding:10px;border:1px solid #333}
.item{margin:5px 0}
</style>
</head>
<body>

<h1>🎲 주사위 AI 엔진</h1>

<input id="d1"><input id="d2"><input id="d3">
<button onclick="add()" id="addBtn">데이터 추가</button>

<label>
  <input type="checkbox" id="betToggle" checked>
  자동 베팅 추천
</label>

<br>
<button onclick="predict()">AI 예측</button>

<h3>📊 데이터 로그</h3>
<div id="log" class="box"></div>

<div id="output" class="box"></div>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let editIndex = null;

function save(){
  localStorage.setItem("history", JSON.stringify(history));
}

// 데이터 추가
function add(){
  let d=[+d1.value,+d2.value,+d3.value];
  if(d.includes(NaN)) return alert("입력");

  if(editIndex!==null){
    history[editIndex]=d;
    editIndex=null;
    addBtn.innerText="데이터 추가";
  }else{
    history.push(d);
  }

  save();
  d1.value=""; d2.value=""; d3.value="";
  renderLog();
}

// 로그
function renderLog(){
  log.innerHTML = history.map((d,i)=>`
    <div class="item">
      ${i+1}. 🎲 ${d.join(",")} (합:${d[0]+d[1]+d[2]})
      <button onclick="editData(${i})">수정</button>
      <button onclick="deleteData(${i})">삭제</button>
    </div>
  `).reverse().join("");
}

function editData(i){
  let d=history[i];
  d1.value=d[0]; d2.value=d[1]; d3.value=d[2];
  editIndex=i;
  addBtn.innerText="수정 완료";
}

function deleteData(i){
  if(confirm("삭제?")){
    history.splice(i,1);
    save();
    renderLog();
  }
}

// ----------------------
// 예측
// ----------------------
function predict(){

  if(history.length<5) return alert("데이터 부족");

  let current = history[history.length-1];

  // 🔥 HIGH/LOW + 홀짝 확률 계산
  let recent = history.slice(-20);
  let sums = recent.map(x=>x[0]+x[1]+x[2]);

  let high = sums.filter(x=>x>=11).length;
  let low = sums.length - high;

  let even = sums.filter(x=>x%2===0).length;
  let odd = sums.length - even;

  let total = sums.length;

  let pHigh=(high/total*100).toFixed(1);
  let pLow=(low/total*100).toFixed(1);
  let pEven=(even/total*100).toFixed(1);
  let pOdd=(odd/total*100).toFixed(1);

  // 패턴
  let transitions={};
  for(let i=0;i<history.length-1;i++){
    let key=history[i].join(",");
    let next=history[i+1].join(",");

    if(!transitions[key]) transitions[key]={};
    if(!transitions[key][next]) transitions[key][next]=0;

    transitions[key][next]++;
  }

  let currentKey=current.join(",");
  let exact=transitions[currentKey];

  let results=[];
  let patternCount=0;

  if(exact){
    let total=Object.values(exact).reduce((a,b)=>a+b,0);
    patternCount=total;

    for(let k in exact){
      results.push({nums:k,prob:(exact[k]/total*100),type:"패턴"});
    }
  }

  // 통계 fallback
  let freq=[0,0,0,0,0,0];
  recent.forEach(d=>d.forEach(n=>freq[n-1]++));

  for(let a=1;a<=6;a++){
    for(let b=1;b<=6;b++){
      for(let c=1;c<=6;c++){
        let score=freq[a-1]+freq[b-1]+freq[c-1];
        results.push({nums:[a,b,c].join(","),prob:score,type:"통계"});
      }
    }
  }

  // 점수 통합
  results = results.map(r=>{
    let w = r.type==="패턴"?3:1;
    return {...r,score:r.prob*w};
  });

  let merged={};
  results.forEach(r=>{
    if(!merged[r.nums]) merged[r.nums]={score:0};
    merged[r.nums].score+=r.score;
  });

  let final = Object.entries(merged).map(([k,v])=>({nums:k,score:v.score}));
  final.sort((a,b)=>b.score-a.score);

  let top = final.slice(0,3);

  // 🔥 조합 해석
  function analyze(nums){
    let arr=nums.split(",").map(Number);
    let sum=arr[0]+arr[1]+arr[2];
    let hl=sum>=11?"HIGH":"LOW";
    let oe=sum%2===0?"짝":"홀";
    return `${hl} / ${oe} (합:${sum})`;
  }

  let confidence = Math.min((patternCount/10)*100,100).toFixed(1);

  let decision = confidence<40 ? "⚠️ 대기" : "🔥 진입";

  output.innerHTML=`
    📊 흐름 확률<br>
    HIGH ${pHigh}% / LOW ${pLow}%<br>
    짝 ${pEven}% / 홀 ${pOdd}%<br><br>

    🎯 추천 TOP3<br>
    1️⃣ ${top[0].nums} → ${analyze(top[0].nums)}<br>
    2️⃣ ${top[1].nums} → ${analyze(top[1].nums)}<br>
    3️⃣ ${top[2].nums} → ${analyze(top[2].nums)}<br><br>

    📈 신뢰도 ${confidence}%<br>
    ${document.getElementById("betToggle").checked ? decision : "추천 OFF"}
  `;
}

// 초기
renderLog();
</script>

</body>
</html>
