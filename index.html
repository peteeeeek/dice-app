<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주사위 분석 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system;text-align:center;padding:30px;background:#111;color:#fff}
input{padding:8px;margin:3px;width:50px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;background:#ff4757;color:#fff;cursor:pointer}
.log{max-height:200px;overflow:auto;border:1px solid #333;margin-top:10px;padding:10px}
.item{margin:4px 0}
.small{font-size:12px}
</style>
</head>
<body>

<h1>🎲 주사위 분석 시스템</h1>

<div>
<input id="d1"><input id="d2"><input id="d3">
<button onclick="saveData()" id="saveBtn">데이터 추가</button>
</div>

<button onclick="predict()">예측</button>

<div class="log" id="log"></div>

<div id="output"></div>

<h3>결과 입력</h3>
<input id="r1"><input id="r2"><input id="r3">
<button onclick="checkResult()">검증</button>

<p id="accuracy"></p>

<canvas id="chart" width="300" height="200"></canvas>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let stats = JSON.parse(localStorage.getItem("stats")) || {total:0, hit:0, streak:0, failStreak:0, log:[]};
let lastPrediction = null;
let editIndex = null;

function saveLocal(){
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("stats", JSON.stringify(stats));
}

function saveData(){
  let d=[+d1.value,+d2.value,+d3.value];
  if(d.includes(NaN)) return alert("입력");

  if(editIndex !== null){
    history[editIndex] = d;
    editIndex = null;
    saveBtn.innerText = "데이터 추가";
  }else{
    history.push(d);
  }

  clearInput();
  saveLocal();
  renderLog();
}

function clearInput(){
  d1.value=""; d2.value=""; d3.value="";
}

function renderLog(){
  log.innerHTML = history.map((d,i)=>`
    <div class="item">
      ${i+1}. 🎲 ${d.join(",")} (합:${d[0]+d[1]+d[2]})
      <button class="small" onclick="editData(${i})">수정</button>
      <button class="small" onclick="deleteData(${i})">삭제</button>
    </div>
  `).reverse().join("");
}

function editData(i){
  let d = history[i];
  d1.value=d[0]; d2.value=d[1]; d3.value=d[2];
  editIndex = i;
  saveBtn.innerText = "수정 완료";
}

function deleteData(i){
  if(confirm("삭제할까요?")){
    history.splice(i,1);
    saveLocal();
    renderLog();
  }
}

function rand(){return Math.floor(Math.random()*6)+1;}

function predict(){
  if(history.length<3) return alert("데이터 부족");

  let sums = history.slice(-20).map(x=>x[0]+x[1]+x[2]);

  let high=sums.filter(x=>x>=11).length;
  let low=sums.length-high;

  let even=sums.filter(x=>x%2===0).length;
  let odd=sums.length-even;

  let targetHL = high>low?"LOW":"HIGH";
  let targetOE = even>odd?"홀":"짝";

  lastPrediction={hl:targetHL,oe:targetOE};

  output.innerHTML=`예측: ${targetHL} / ${targetOE}`;
}

function checkResult(){
  if(!lastPrediction) return alert("먼저 예측");

  let sum=+r1.value+ +r2.value+ +r3.value;
  let hl=sum>=11?"HIGH":"LOW";
  let oe=sum%2===0?"짝":"홀";

  stats.total++;

  let isHit = (hl===lastPrediction.hl && oe===lastPrediction.oe);

  if(isHit){
    stats.hit++;
    stats.streak++;
    stats.failStreak=0;
  }else{
    stats.failStreak++;
    stats.streak=0;
  }

  stats.log.push((stats.hit/stats.total)*100);

  saveLocal();
  updateUI();
}

function updateUI(){
  let acc = (stats.hit/stats.total*100).toFixed(1);

  accuracy.innerHTML = `
    적중률: ${acc}%<br>
    연승: ${stats.streak} / 연패: ${stats.failStreak}
  `;

  drawChart();
}

let chart;

function drawChart(){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels: stats.log.map((_,i)=>i+1),
      datasets:[{data:stats.log, borderWidth:2}]
    }
  });
}

renderLog();
updateUI();
</script>

</body>
</html>
